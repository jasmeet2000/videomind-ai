name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libglib2.0-0 libsm6 libxext6 libxrender-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Also install frontend requirements just in case we add frontend tests later
          pip install -r frontend/requirements.txt
          # Install ruff and pytest
          pip install ruff pytest pytest-asyncio pytest-cov httpx asgi-lifespan

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Run tests with pytest
        run: |
          # Use an in-memory database configuration for testing
          export DATABASE_URL="sqlite+aiosqlite:///:memory:"
          pytest --cov=app --cov-fail-under=80
